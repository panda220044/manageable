services:
  - type: web
    name: manageable-backend
    env: node
    region: oregon
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manageable-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: manageable-db
    databaseName: manageable
    region: oregon
    plan: free
